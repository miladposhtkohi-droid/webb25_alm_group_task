services:
  db:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: ..
      dockerfile: docker/dockerfile
    environment:
      - MONGODB_URI=mongodb://admin:password@db:27017/webb25_alm?authSource=admin
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  mongo_data: